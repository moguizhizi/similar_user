neo4j:
  uri: "bolt://localhost:7687"
  username: "neo4j"
  password: "password"
  database: "neo4j"

llm:
  base_url: "http://localhost:8000"
  api_key: ""
  model: "qwen3_5"
  timeout: 60
  max_retries: 3
  backoff_factor: 1.5

query:
  graph_path_limit:
    per_g_strategy: "band"
    bands:
      - max_g_count: 49
        per_g: 10
      - max_g_count: 199
        per_g: 6
      - per_g: 4
    max_limit_source: "total_paths"
  training_date_split:
    min_training_dates: 5
    before_ratio: 4
    after_ratio: 1
  pattern_path_storage:
    output_dir: "data/pattern_paths"
  candidate_ranking:
    path_top_k: 50
    candidate_top_k: 10

similarity:
  top_k: 20
  strategy: "graph"
  embedding:
    enabled: false
    dimension: 64
